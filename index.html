<script type="text/babel">

       {v:"León",c:"Baja"},{v:"Asturias",c:"Baja"},{v:"Ourense",c:"Baja"},{v:"Lugo",c:"Baja"},{v:"Pontevedra",c:"Baja"},{v:"Salamanca",c:"Baja"},{v:"Segovia",c:"Baja"},{v:"Ávila",c:"Baja"},{v:"Toledo",c:"Baja"},{v:"Cuenca",c:"Baja"},{v:"Castellón",c:"Baja"},{v:"Valencia",c:"Baja"},{v:"Tarragona",c:"Baja"},{v:"Girona",c:"Baja"},
       {v:"Albacete",c:"Muy baja"},{v:"Alicante",c:"Muy baja"},{v:"Murcia",c:"Muy baja"},{v:"Almería",c:"Muy baja"},{v:"Granada",c:"Muy baja"},{v:"Jaén",c:"Muy baja"},{v:"Córdoba",c:"Muy baja"},{v:"Sevilla",c:"Muy baja"},{v:"Cádiz",c:"Muy baja"},{v:"Huelva",c:"Muy baja"},{v:"Badajoz",c:"Muy baja"},{v:"Cáceres",c:"Muy baja"},{v:"Las Palmas",c:"Muy baja"},{v:"Santa Cruz de Tenerife",c:"Muy baja"},{v:"Illes Balears",c:"Muy baja"},{v:"La Coruña",c:"Muy baja"},{v:"Málaga",c:"Muy baja"},{v:"Zamora",c:"Muy baja"},{v:"Teruel",c:"Muy baja"},{v:"Ciudad Real",c:"Muy baja"},

    {id:"P4",label:"Estado de la partida",prop:"madurez_en_adjudicacion_obra__proyecto",
     opciones:[{v:"Licitada",c:"Muy baja"},{v:"Fase final de decisión",c:"Baja"},{v:"Adjudicada",c:"Alta"},{v:"En ejecución nuestra",c:"Muy alta"},{v:"En ejecución tercero",c:"Media"}]},
    {id:"P5",label:"Tipo de partida",prop:"tipo_de_obra__proyecto",
     opciones:[{v:"Nuevo",c:"Muy alta"},{v:"Ampliación",c:"Alta"},{v:"Servicio",c:"Baja"},{v:"Reforma",c:"Muy baja"},{v:"Auxiliar / Cerrajeria",c:"Muy baja"},{v:"Sobre estructura de Hormigón",c:"Media"}]},
    {id:"P6",label:"Valor partida",prop:"valor_actual",esRango:true,
     opciones:[{v:"0-100k",c:"Muy baja",mn:0,mx:100000},{v:"100k-300k",c:"Baja",mn:100001,mx:300000},{v:"300k-500k",c:"Media",mn:300001,mx:500000},{v:"500k-1M",c:"Alta",mn:500001,mx:1000000},{v:">1M",c:"Muy alta",mn:1000001,mx:999999999}]},
  ]
};

function calcScore(props,matrix){
  let t=0;
  for(const cr of matrix.criterios){
    const peso=matrix.pesos[cr.id]||0,val=props[cr.prop];
    let cual=null;
    if(cr.esRango){const n=parseFloat(val);if(!isNaN(n))for(const op of cr.opciones)if(n>=op.mn&&n<op.mx){cual=op.c;break;}}
    else{const op=cr.opciones.find(o=>o.v===val);if(op)cual=op.c;}
    t+=peso*(MULT[cual]??0);
  }
  return Math.max(0,Math.min(100,Math.round(((t+100)/200)*100)));
}
function getBreakdown(props,matrix){
  return matrix.criterios.map(cr=>{
    const peso=matrix.pesos[cr.id]||0,val=props[cr.prop];
    let cual=null,lbl=val||"—";
    if(cr.esRango){const n=parseFloat(val);if(!isNaN(n))for(const op of cr.opciones)if(n>=op.mn&&n<op.mx){cual=op.c;lbl=op.v;break;}}
    else{const op=cr.opciones.find(o=>o.v===val);if(op)cual=op.c;}
    return{id:cr.id,label:cr.label,val:lbl,cual,pts:Math.round(peso*(MULT[cual]??0))};
  });
}

const CUAL_C={"Muy alta":{bg:"#dcfce7",tx:"#15803d"},"Alta":{bg:"#d1fae5",tx:"#065f46"},"Media":{bg:"#fef9c3",tx:"#854d0e"},"Baja":{bg:"#fee2e2",tx:"#b91c1c"},"Muy baja":{bg:"#fecaca",tx:"#991b1b"}};

const EC=Object.fromEntries(ESTADOS.map(e=>[e.value,e]));

function Bar({s}){
  const c=s>=70?"#22c55e":s>=45?"#eab308":"#ef4444";
  const tc=s>=70?"#15803d":s>=45?"#a16207":"#b91c1c";
  const bg=s>=70?"#dcfce7":s>=45?"#fef9c3":"#fee2e2";
  return <div style={{display:"flex",alignItems:"center",gap:6}}>
    <div style={{flex:1,background:"#e5e7eb",borderRadius:99,height:5,minWidth:40,overflow:"hidden"}}>
      <div style={{width:`${s}%`,background:c,height:"100%",borderRadius:99}}/>
    </div>
    <span style={{fontWeight:700,fontSize:12,color:tc,background:bg,padding:"1px 7px",borderRadius:5,minWidth:30,textAlign:"center"}}>{s}</span>
  </div>;
}

// ── CONFIGURADOR ──────────────────────────────────────────────────────────
function TabConfig({matrix,setMatrix}){
  const [lm,setLm]=useState(()=>JSON.parse(JSON.stringify(matrix)));
  const [saved,setSaved]=useState(false);
  const total=Object.values(lm.pesos).reduce((a,b)=>a+b,0);
  const updC=(cid,idx,val)=>{const m=JSON.parse(JSON.stringify(lm));m.criterios.find(c=>c.id===cid).opciones[idx].c=val;setLm(m);};
  const updP=(cid,val)=>{const m=JSON.parse(JSON.stringify(lm));m.pesos[cid]=parseInt(val)||0;setLm(m);};
  const save=()=>{setMatrix(lm);setSaved(true);setTimeout(()=>setSaved(false),2000);};
  const reset=()=>setLm(JSON.parse(JSON.stringify(DEFAULT_MATRIX)));
  return <div style={{padding:16}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <div>
        <div style={{fontWeight:700,fontSize:15,color:"#0f172a"}}>Configurador de Scoring RCM</div>
        <div style={{fontSize:11,color:"#64748b",marginTop:2}}>Edita la matriz cualitativa · los cambios se aplican al dashboard en tiempo real</div>
      </div>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        {saved&&<span style={{fontSize:12,color:"#15803d",fontWeight:600}}>✓ Guardado</span>}
        <button onClick={reset} style={{background:"#f1f5f9",color:"#475569",border:"1px solid #e2e8f0",borderRadius:7,padding:"7px 14px",fontSize:12,fontWeight:600,cursor:"pointer"}}>Resetear</button>
        <button onClick={save} style={{background:"#0f172a",color:"#fff",border:"none",borderRadius:7,padding:"7px 14px",fontSize:12,fontWeight:600,cursor:"pointer"}}>💾 Aplicar cambios</button>
      </div>
    </div>
    <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,padding:14,marginBottom:14}}>
      <div style={{fontWeight:700,fontSize:12,color:"#475569",textTransform:"uppercase",letterSpacing:0.5,marginBottom:10}}>
        Pesos por criterio · Total: <span style={{color:total===100?"#15803d":"#dc2626"}}>{total}/100</span>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:10}}>
        {lm.criterios.map(c=>(
          <div key={c.id} style={{textAlign:"center"}}>
            <div style={{fontSize:11,color:"#64748b",marginBottom:4}}>{c.id}</div>
            <input type="number" value={lm.pesos[c.id]} onChange={e=>updP(c.id,e.target.value)}
              style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:6,padding:"5px",textAlign:"center",fontSize:14,fontWeight:700,color:"#0f172a"}}/>
            <div style={{fontSize:10,color:"#94a3b8",marginTop:3}}>{c.label.substring(0,14)}…</div>
          </div>
        ))}
      </div>
    </div>
    {lm.criterios.map(cr=>(
      <div key={cr.id} style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,marginBottom:10,overflow:"hidden"}}>
        <div style={{background:"#f8fafc",padding:"8px 14px",borderBottom:"1px solid #e2e8f0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontWeight:700,fontSize:13,color:"#0f172a"}}>{cr.id} · {cr.label}</span>
          <span style={{fontSize:11,fontWeight:700,color:"#3b82f6",background:"#eff6ff",padding:"2px 8px",borderRadius:6}}>Peso: {lm.pesos[cr.id]} pts</span>
        </div>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr style={{background:"#f8fafc"}}>
            <th style={{padding:"7px 14px",textAlign:"left",fontWeight:600,color:"#475569",borderBottom:"1px solid #e2e8f0"}}>Opción</th>
            <th style={{padding:"7px 14px",textAlign:"center",fontWeight:600,color:"#475569",borderBottom:"1px solid #e2e8f0",width:160}}>Cualitativo</th>
            <th style={{padding:"7px 14px",textAlign:"center",fontWeight:600,color:"#475569",borderBottom:"1px solid #e2e8f0",width:100}}>Multiplicador</th>
            <th style={{padding:"7px 14px",textAlign:"center",fontWeight:600,color:"#475569",borderBottom:"1px solid #e2e8f0",width:80}}>Puntos</th>
          </tr></thead>
          <tbody>
            {cr.opciones.map((op,idx)=>{
              const mult=MULT[op.c]??0,pts=Math.round((lm.pesos[cr.id]||0)*mult);
              const cc=CUAL_C[op.c]||{bg:"#f1f5f9",tx:"#475569"};
              return <tr key={idx} style={{borderBottom:"1px solid #f1f5f9"}}>
                <td style={{padding:"6px 14px",color:"#374151"}}>{op.v}</td>
                <td style={{padding:"6px 14px",textAlign:"center"}}>
                  <select value={op.c} onChange={e=>updC(cr.id,idx,e.target.value)}
                    style={{border:"1px solid #e2e8f0",borderRadius:6,padding:"3px 8px",fontSize:12,background:cc.bg,color:cc.tx,fontWeight:600,cursor:"pointer"}}>
                    {Object.keys(MULT).map(m=><option key={m} value={m}>{m}</option>)}
                  </select>
                </td>
                <td style={{padding:"6px 14px",textAlign:"center",color:"#64748b",fontWeight:500}}>{mult}</td>
                <td style={{padding:"6px 14px",textAlign:"center",fontWeight:700,color:pts>0?"#15803d":pts<0?"#dc2626":"#64748b"}}>{pts>0?`+${pts}`:pts}</td>
              </tr>;
            })}
          </tbody>
        </table>
      </div>
    ))}
  </div>;
}

// ── DROPDOWN DE COLUMNA ───────────────────────────────────────────────────
function ColDropdown({prop, values, colFilter, setColFilter, setPage}){
  const [open,setOpen]=useState(false);
  const ref=useRef(null);
  const hasF=!!colFilter[prop];

  useEffect(()=>{
    function h(e){if(ref.current&&!ref.current.contains(e.target))setOpen(false);}
    document.addEventListener("mousedown",h);
    return()=>document.removeEventListener("mousedown",h);
  },[]);

  return <div ref={ref} style={{position:"relative",display:"inline-block"}}>
    <span onClick={e=>{e.stopPropagation();setOpen(o=>!o);}}
      style={{cursor:"pointer",fontSize:12,color:hasF?"#3b82f6":"#94a3b8",fontWeight:hasF?700:400,
        background:hasF?"#eff6ff":"transparent",borderRadius:3,padding:"1px 4px",marginLeft:2,lineHeight:1.5,userSelect:"none"}}>
      {hasF?"⚡":"▾"}
    </span>
    {open&&<div style={{position:"absolute",top:"calc(100% + 4px)",right:0,zIndex:9999,background:"#fff",
      border:"1px solid #e2e8f0",borderRadius:8,boxShadow:"0 8px 24px rgba(0,0,0,0.15)",
      minWidth:160,maxHeight:240,overflowY:"auto"}}>
      <div onClick={()=>{setColFilter(f=>({...f,[prop]:""}));setOpen(false);setPage(0);}}
        style={{padding:"7px 12px",cursor:"pointer",fontSize:12,borderBottom:"1px solid #f1f5f9",
          fontWeight:!colFilter[prop]?700:400,color:!colFilter[prop]?"#1d4ed8":"#374151"}}>
        Todos
      </div>
      {values.map(v=>(
        <div key={v} onClick={()=>{setColFilter(f=>({...f,[prop]:v}));setOpen(false);setPage(0);}}
          style={{padding:"6px 12px",cursor:"pointer",fontSize:11.5,borderBottom:"1px solid #f9fafb",
            background:colFilter[prop]===v?"#eff6ff":"#fff",fontWeight:colFilter[prop]===v?700:400,color:"#374151"}}>
          {v}
        </div>
      ))}
    </div>}
  </div>;
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────
function TabDashboard({scored,matrix}){
  const [search,setSearch]=useState("");
  const [scoreFilter,setScoreFilter]=useState(null);
  const [filterE,setFilterE]=useState([]);
  const [dropOpen,setDropOpen]=useState(false);
  const [sortKey,setSortKey]=useState("score");
  const [sortDir,setSortDir]=useState("desc");
  const [colFilter,setColFilter]=useState({});
  const [expanded,setExpanded]=useState(null);
  const [page,setPage]=useState(0);
  const dropRef=useRef(null);
  const PAGE=15;

  useEffect(()=>{
    function h(e){if(dropRef.current&&!dropRef.current.contains(e.target))setDropOpen(false);}
    document.addEventListener("mousedown",h);
    return()=>document.removeEventListener("mousedown",h);
  },[]);

  function getUnique(prop){
    return [...new Set(scored.map(d=>(d.properties||{})[prop]||"").filter(Boolean))].sort();
  }

  const counts={
    total:scored.length,
    alto:scored.filter(d=>d.score>=70).length,
    medio:scored.filter(d=>d.score>=45&&d.score<70).length,
    bajo:scored.filter(d=>d.score<45).length,
  };

  const filtered=useMemo(()=>{
    let r=scored.filter(d=>{
      const p=d.properties||{};
      const q=search.toLowerCase();
      const okQ=(p.dealname||"").toLowerCase().includes(q)||(p.numero_de_partida||"").toLowerCase().includes(q);
      const okE=filterE.length===0||filterE.includes(p.estado_de_la_ultima_oferta);
      const okS=scoreFilter===null||(scoreFilter==="alto"&&d.score>=70)||(scoreFilter==="medio"&&d.score>=45&&d.score<70)||(scoreFilter==="bajo"&&d.score<45);
      const okC=Object.entries(colFilter).every(([col,val])=>!val||(p[col]||"")===val);
      return okQ&&okE&&okS&&okC;
    });
    r=[...r].sort((a,b)=>{
      const pa=a.properties||{},pb=b.properties||{};
      let va,vb;
      if(sortKey==="score"){va=a.score;vb=b.score;}
      else if(sortKey==="valor"){va=parseFloat(pa.valor_actual)||0;vb=parseFloat(pb.valor_actual)||0;}
      else if(sortKey==="peso"){va=parseFloat(pa.peso_total_cmr_toneladas)||0;vb=parseFloat(pb.peso_total_cmr_toneladas)||0;}
      else{va=(pa[sortKey]||"").toLowerCase();vb=(pb[sortKey]||"").toLowerCase();}
      if(va<vb)return sortDir==="asc"?-1:1;
      if(va>vb)return sortDir==="asc"?1:-1;
      return 0;
    });
    return r;
  },[scored,search,filterE,scoreFilter,sortKey,sortDir,colFilter]);

  const paged=filtered.slice(page*PAGE,(page+1)*PAGE);
  const totalPages=Math.ceil(filtered.length/PAGE);
  const activeColFilters=Object.values(colFilter).filter(Boolean).length;

  function handleSort(key){
    if(sortKey===key)setSortDir(d=>d==="asc"?"desc":"asc");
    else{setSortKey(key);setSortDir("desc");}
    setPage(0);
  }

  function SortBtn({k,label,prop,align="left"}){
    const active=sortKey===k;
    const vals=prop?getUnique(prop):[];
    return <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:2,padding:"8px 6px",cursor:k?"pointer":"default",userSelect:"none"}}
      onClick={()=>k&&handleSort(k)}>
      <span style={{fontSize:11.5,fontWeight:600,color:active?"#3b82f6":"#475569",whiteSpace:"nowrap"}}>
        {label}
      </span>
      {k&&<span style={{fontSize:10,color:active?"#3b82f6":"#d1d5db"}}>{active?(sortDir==="asc"?"▲":"▼"):"⇅"}</span>}
      {prop&&vals.length>0&&<ColDropdown prop={prop} values={vals} colFilter={colFilter} setColFilter={setColFilter} setPage={setPage}/>}
    </div>;
  }

  return <div style={{padding:14}}>
    {/* Tarjetas resumen — grid 4 columnas, sin scroll */}
    {scored.length>0&&<div style={{display:"grid",gridTemplateColumns:"repeat(4,minmax(0,1fr))",gap:8,marginBottom:12}}>
      {[
        {l:"Total",key:null,i:"📋",c:"#3b82f6",v:counts.total},
        {l:"Score alto ≥70",key:"alto",i:"🟢",c:"#22c55e",v:counts.alto},
        {l:"Score medio 45-70",key:"medio",i:"🟡",c:"#eab308",v:counts.medio},
        {l:"Score bajo <45",key:"bajo",i:"🔴",c:"#ef4444",v:counts.bajo},
      ].map((s,i)=>{
        const active=s.key===null?(scoreFilter===null):scoreFilter===s.key;
        return <div key={i} onClick={()=>{setScoreFilter(null);if(s.key!==null)setScoreFilter(sf=>sf===s.key?null:s.key);setPage(0);}}
          style={{background:"#fff",border:`2px solid ${active?s.c:"#e2e8f0"}`,borderRadius:10,padding:"10px 12px",
            borderTop:`3px solid ${s.c}`,cursor:"pointer",userSelect:"none",
            opacity:scoreFilter!==null&&!active&&s.key!==null?0.5:1,transition:"all 0.15s",minWidth:0}}>
          <div style={{fontSize:16}}>{s.i}</div>
          <div style={{fontSize:20,fontWeight:800,color:"#0f172a"}}>{s.v}</div>
          <div style={{fontSize:11,color:"#64748b",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{s.l}</div>
          {active&&<div style={{fontSize:9,color:s.c,fontWeight:700,marginTop:2}}>{s.key===null?"✓ Todos":"✓ Filtrando"}</div>}
        </div>;
      })}
    </div>}

    {/* Barra filtros */}
    <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,padding:"10px 14px",marginBottom:12,display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
      <input placeholder="🔍 Buscar nombre o nº partida..." value={search}
        onChange={e=>{setSearch(e.target.value);setPage(0);}}
        style={{flex:1,minWidth:200,border:"1px solid #e2e8f0",borderRadius:7,padding:"6px 10px",fontSize:12.5,color:"#1e293b"}}/>
      <div ref={dropRef} style={{position:"relative",minWidth:180}}>
        <div onClick={()=>setDropOpen(o=>!o)}
          style={{border:"1px solid #e2e8f0",borderRadius:7,padding:"6px 10px",fontSize:12.5,background:"#fff",cursor:"pointer",color:"#374151",userSelect:"none",whiteSpace:"nowrap"}}>
          {filterE.length===0?"Todos los estados":filterE.length===1?ESTADOS.find(e=>e.value===filterE[0])?.label:`${filterE.length} estados`} ▾
        </div>
        {dropOpen&&<div style={{position:"absolute",top:"100%",left:0,zIndex:100,background:"#fff",border:"1px solid #e2e8f0",borderRadius:7,
          boxShadow:"0 4px 12px rgba(0,0,0,0.1)",width:260,maxHeight:280,overflowY:"auto",marginTop:2}}>
          <div onClick={()=>{setFilterE([]);setDropOpen(false);setPage(0);}}
            style={{padding:"6px 10px",cursor:"pointer",fontSize:12,fontWeight:filterE.length===0?700:400,
              color:filterE.length===0?"#1d4ed8":"#374151",borderBottom:"1px solid #f1f5f9"}}>✓ Todos los estados</div>
          {ESTADOS.map(e=>(
            <div key={e.value} onClick={()=>{setFilterE(prev=>prev.includes(e.value)?prev.filter(x=>x!==e.value):[...prev,e.value]);setPage(0);}}
              style={{padding:"6px 10px",cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",gap:8,
                background:filterE.includes(e.value)?"#f8fafc":"#fff",borderBottom:"1px solid #f9fafb"}}>
              <span style={{width:14,height:14,border:"1px solid #d1d5db",borderRadius:3,
                background:filterE.includes(e.value)?"#3b82f6":"#fff",display:"flex",alignItems:"center",
                justifyContent:"center",fontSize:10,color:"#fff",flexShrink:0}}>{filterE.includes(e.value)?"✓":""}</span>
              <span style={{background:e.bg,color:e.tx,padding:"1px 6px",borderRadius:99,fontSize:11,fontWeight:500}}>{e.label}</span>
            </div>
          ))}
        </div>}
      </div>
      {activeColFilters>0&&<button onClick={()=>{setColFilter({});setPage(0);}}
        style={{background:"#fee2e2",color:"#b91c1c",border:"none",borderRadius:7,padding:"6px 10px",fontSize:12,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>
        ✕ Quitar filtros ({activeColFilters})
      </button>}
      <span style={{fontSize:11,color:"#94a3b8",whiteSpace:"nowrap"}}>{filtered.length} resultados</span>
    </div>

    {/* Tabla */}
    {filtered.length===0&&scored.length>0&&<div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,padding:"40px",textAlign:"center"}}>
      <div style={{fontSize:32,marginBottom:8}}>🔍</div>
      <div style={{fontWeight:600,color:"#374151",marginBottom:4}}>No hay resultados con los filtros aplicados</div>
      <button onClick={()=>{setColFilter({});setFilterE([]);setScoreFilter(null);setPage(0);}}
        style={{background:"#eff6ff",color:"#1d4ed8",border:"none",borderRadius:7,padding:"7px 14px",fontSize:12,fontWeight:600,cursor:"pointer",marginTop:8}}>
        Quitar todos los filtros
      </button>
    </div>}

    {scored.length>0&&<div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,overflow:"auto",display:filtered.length===0?"none":"block"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,tableLayout:"fixed"}}>
        <colgroup>
          <col style={{width:32}}/><col/><col style={{width:90}}/><col style={{width:78}}/>
          <col style={{width:88}}/><col style={{width:102}}/><col style={{width:128}}/><col style={{width:142}}/><col style={{width:128}}/><col style={{width:26}}/>
        </colgroup>
        <thead>
          <tr style={{borderBottom:"2px solid #e2e8f0",background:"#f8fafc"}}>
            <th style={{padding:"0 8px",fontSize:11,fontWeight:600,color:"#475569",textAlign:"center"}}>#</th>
            <th style={{padding:0,background:sortKey==="dealname"?"#eef2ff":"#f8fafc"}}>
              <SortBtn k="dealname" label="Orden para presupuestación" prop="dealname"/>
            </th>
            <th style={{padding:0,background:sortKey==="prioridad_de_obra__proyecto"?"#eef2ff":"#f8fafc"}}>
              <SortBtn k="prioridad_de_obra__proyecto" label="Prioridad" prop="prioridad_de_obra__proyecto"/>
            </th>
            <th style={{padding:0,background:sortKey==="peso"?"#eef2ff":"#f8fafc"}}>
              <SortBtn k="peso" label="Peso Tn" prop="peso_total_cmr_toneladas"/>
            </th>
            <th style={{padding:0,background:sortKey==="ubicacion_provincia_obra__proyecto"?"#eef2ff":"#f8fafc"}}>
              <SortBtn k="ubicacion_provincia_obra__proyecto" label="Provincia" prop="ubicacion_provincia_obra__proyecto"/>
            </th>
            <th style={{padding:0,background:sortKey==="valor"?"#eef2ff":"#f8fafc"}}>
              <SortBtn k="valor" label="Valor"/>
            </th>
            <th style={{padding:0,background:sortKey==="madurez_en_adjudicacion_obra__proyecto"?"#eef2ff":"#f8fafc"}}>
              <SortBtn k="madurez_en_adjudicacion_obra__proyecto" label="Estado partida" prop="madurez_en_adjudicacion_obra__proyecto"/>
            </th>
            <th style={{padding:0,background:sortKey==="estado_de_la_ultima_oferta"?"#eef2ff":"#f8fafc"}}>
              <SortBtn k="estado_de_la_ultima_oferta" label="Estado oferta" prop="estado_de_la_ultima_oferta"/>
            </th>
            <th style={{padding:0,background:sortKey==="score"?"#eef2ff":"#f8fafc"}}>
              <SortBtn k="score" label="Score RCM"/>
            </th>
            <th style={{background:"#f8fafc"}}></th>
          </tr>
        </thead>
        <tbody>
          {paged.length===0&&<tr><td colSpan={10} style={{padding:20,textAlign:"center",color:"#94a3b8",fontSize:12}}>Sin resultados</td></tr>}
          {paged.map((d,i)=>{
            const rank=page*PAGE+i+1;
            const p=d.properties||{};
            const ec=EC[p.estado_de_la_ultima_oferta]||{bg:"#f1f5f9",tx:"#475569",label:p.estado_de_la_ultima_oferta||"—"};
            const isExp=expanded===d.id;
            const priorCC=CUAL_C[PRIOR_MAP[p.prioridad_de_obra__proyecto]]||{bg:"#f1f5f9",tx:"#475569"};
            const bd=getBreakdown(p,matrix);
            return [
              <tr key={d.id} className="drow" onClick={()=>setExpanded(isExp?null:d.id)}
                style={{borderBottom:isExp?"none":"1px solid #f1f5f9",cursor:"pointer"}}>
                <td style={{padding:"9px 8px",textAlign:"center",color:"#94a3b8",fontWeight:600,fontSize:11}}>{rank}</td>
                <td style={{padding:"9px 8px"}}>
                  <div style={{fontWeight:600,color:"#1e293b",lineHeight:1.3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.dealname||"Sin nombre"}</div>
                  {p.numero_de_partida&&<div style={{fontSize:10,color:"#94a3b8",marginTop:1}}>#{p.numero_de_partida}</div>}
                </td>
                <td style={{padding:"9px 6px",textAlign:"center"}}>
                  {p.prioridad_de_obra__proyecto
                    ?<span style={{background:priorCC.bg,color:priorCC.tx,padding:"2px 5px",borderRadius:99,fontSize:10,fontWeight:600,whiteSpace:"nowrap"}}>{p.prioridad_de_obra__proyecto}</span>
                    :<span style={{color:"#cbd5e1"}}>—</span>}
                </td>
                <td style={{padding:"9px 6px",textAlign:"center",color:"#374151",fontWeight:600}}>{p.peso_total_cmr_toneladas||"—"}</td>
                <td style={{padding:"9px 6px",textAlign:"center",color:"#374151",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.ubicacion_provincia_obra__proyecto||"—"}</td>
                <td style={{padding:"9px 6px",textAlign:"center",color:"#374151",fontWeight:500,whiteSpace:"nowrap"}}>
                  {p.valor_actual&&parseFloat(p.valor_actual)>0?`${parseFloat(p.valor_actual).toLocaleString("es-ES",{maximumFractionDigits:0})} €`:"—"}
                </td>
                <td style={{padding:"9px 6px",textAlign:"center"}}>
                  {p.madurez_en_adjudicacion_obra__proyecto
                    ?<span style={{background:"#f1f5f9",color:"#475569",padding:"2px 5px",borderRadius:99,fontSize:10,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",display:"block",textOverflow:"ellipsis"}}>{p.madurez_en_adjudicacion_obra__proyecto}</span>
                    :<span style={{color:"#cbd5e1"}}>—</span>}
                </td>
                <td style={{padding:"9px 6px",textAlign:"center"}}>
                  <span style={{background:ec.bg,color:ec.tx,padding:"2px 5px",borderRadius:99,fontSize:10,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",display:"block",textOverflow:"ellipsis"}}>{ec.label}</span>
                </td>
                <td style={{padding:"9px 6px"}}><Bar s={d.score}/></td>
                <td style={{padding:"9px 6px",textAlign:"center",color:"#94a3b8",fontSize:11}}>{isExp?"▲":"▼"}</td>
              </tr>,
              isExp&&<tr key={d.id+"_exp"} style={{background:"#f8fafc",borderBottom:"1px solid #e2e8f0"}}>
                <td colSpan={10} style={{padding:"12px 20px 16px"}}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
                    <div>
                      <div style={{fontWeight:700,color:"#475569",marginBottom:6,fontSize:11,textTransform:"uppercase",letterSpacing:0.5}}>Desglose scoring RCM</div>
                      {bd.map(b=>{
                        const cc=CUAL_C[b.cual]||{bg:"#f1f5f9",tx:"#475569"};
                        return <div key={b.id} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid #f3f4f6",fontSize:11.5}}>
                          <span style={{color:"#6b7280"}}>{b.id} · {b.label}</span>
                          <div style={{display:"flex",gap:6,alignItems:"center"}}>
                            <span style={{color:"#111827",fontWeight:500,fontSize:11}}>{b.val}</span>
                            {b.cual&&<span style={{background:cc.bg,color:cc.tx,padding:"0 5px",borderRadius:99,fontSize:10,fontWeight:600}}>{b.cual}</span>}
                            <span style={{fontWeight:700,minWidth:28,textAlign:"right",color:b.pts>0?"#16a34a":b.pts<0?"#dc2626":"#9ca3af"}}>{b.pts>0?`+${b.pts}`:b.pts}</span>
                          </div>
                        </div>;
                      })}
                      <div style={{marginTop:6,padding:"5px 0",display:"flex",justifyContent:"space-between",fontWeight:700,fontSize:12,borderTop:"2px solid #e2e8f0"}}>
                        <span style={{color:"#374151"}}>Score total</span>
                        <span style={{color:d.score>=70?"#15803d":d.score>=45?"#a16207":"#b91c1c"}}>{d.score} / 100</span>
                      </div>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",gap:8}}>
                      <div style={{fontSize:52,fontWeight:800,color:d.score>=70?"#15803d":d.score>=45?"#a16207":"#b91c1c",lineHeight:1}}>{d.score}</div>
                      <div style={{fontSize:11,color:"#94a3b8"}}>sobre 100 puntos</div>
                      <div style={{width:"100%"}}><Bar s={d.score}/></div>
                      <a href={`https://app-eu1.hubspot.com/contacts/147691795/record/0-3/${d.id}`} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()}
                        style={{display:"block",width:"100%",textAlign:"center",background:"#ff7a59",color:"#fff",borderRadius:7,padding:"8px",fontSize:12,fontWeight:600,textDecoration:"none",boxSizing:"border-box",marginTop:4}}>
                        🔗 Abrir en HubSpot
                      </a>
                    </div>
                  </div>
                </td>
              </tr>
            ];
          })}
        </tbody>
      </table>
      {totalPages>1&&paged.length>0&&<div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:8,padding:"10px",borderTop:"1px solid #e2e8f0"}}>
        <button onClick={()=>setPage(p=>Math.max(0,p-1))} disabled={page===0}
          style={{border:"1px solid #e2e8f0",background:page===0?"#f8fafc":"#fff",color:page===0?"#cbd5e1":"#374151",borderRadius:6,padding:"5px 12px",cursor:page===0?"not-allowed":"pointer",fontSize:12}}>← Anterior</button>
        <span style={{fontSize:12,color:"#64748b"}}>Página {page+1} de {totalPages}</span>
        <button onClick={()=>setPage(p=>Math.min(totalPages-1,p+1))} disabled={page===totalPages-1}
          style={{border:"1px solid #e2e8f0",background:page===totalPages-1?"#f8fafc":"#fff",color:page===totalPages-1?"#cbd5e1":"#374151",borderRadius:6,padding:"5px 12px",cursor:page===totalPages-1?"not-allowed":"pointer",fontSize:12}}>Siguiente →</button>
      </div>}
    </div>}
  </div>;
}

// ── APP ───────────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState("dashboard");
  const [matrix,setMatrix]=useState(DEFAULT_MATRIX);
  const [deals,setDeals]=useState([]);
  const [loading,setLoading]=useState(false);
  const [lastUpdate,setLastUpdate]=useState(null);

  const scored=useMemo(()=>deals.map(d=>({...d,score:calcScore(d.properties||{},matrix)})),[deals,matrix]);

  const refresh=useCallback(async()=>{
    setLoading(true);
    try{
      const res=await fetch("/api/hubspot",{method:"POST"});
      const data=await res.json();
      const results=data.results||[];
      setDeals(results);
      setLastUpdate(new Date());
      setLoading(false);
      const payload=results.map(d=>({id:d.id,score:calcScore(d.properties||{},matrix)}));
      fetch("/api/write-scores",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({deals:payload})}).catch(()=>{});
    }catch(e){console.error(e);setLoading(false);}
  },[matrix]);

  useEffect(()=>{refresh();},[]);

  return <div style={{fontFamily:"'Inter',system-ui,sans-serif",background:"#f8fafc",minHeight:"100vh"}}>
    <div style={{background:"#0f172a",padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:34,height:34,background:"#3b82f6",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,color:"#fff",fontSize:16}}>R</div>
        <div>
          <div style={{color:"#fff",fontWeight:700,fontSize:15}}>Dashboard RCM</div>
          <div style={{color:"#94a3b8",fontSize:11}}>{loading?"Cargando...":lastUpdate?`${scored.length} negocios · ${lastUpdate.toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"})}`:"Sin datos"}</div>
        </div>
      </div>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <div style={{display:"flex",background:"#1e293b",borderRadius:8,padding:3,gap:2}}>
          {[{id:"dashboard",label:"📊 Dashboard"},{id:"config",label:"⚙️ Scoring"}].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              style={{background:tab===t.id?"#3b82f6":"transparent",color:tab===t.id?"#fff":"#94a3b8",border:"none",borderRadius:6,padding:"5px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}}>
              {t.label}
            </button>
          ))}
        </div>
        <button onClick={refresh} disabled={loading}
          style={{display:"flex",alignItems:"center",gap:6,background:loading?"#1e293b":"#3b82f6",color:loading?"#64748b":"#fff",border:"none",borderRadius:8,padding:"8px 14px",fontSize:13,fontWeight:600,cursor:loading?"not-allowed":"pointer"}}>
          <span style={{display:"inline-block",animation:loading?"spin 1s linear infinite":"none",fontSize:15}}>⟳</span>
          {loading?"Cargando...":"Actualizar"}
        </button>
      </div>
    </div>
    {tab==="dashboard"?<TabDashboard scored={scored} matrix={matrix}/>:<TabConfig matrix={matrix} setMatrix={setMatrix}/>}
  </div>;
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>
